services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: csv_ingestion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d csv_ingestion"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8011
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/csv_ingestion
      DATASET_IDS: seguridad-snic---total-pais-estadisticas-criminales-republica-argentina,seguridad-snic---provincial-estadisticas-criminales-republica-argentina-por-provincias,seguridad-estadisticas-sobre-uso-racional-fuerza-empleo-armas-fuego-fuerzas-federales
      RESOURCE_FORMATS: CSV,XLSX
      SYNC_CRON: 0 0 * * *
      EXPECTED_RESOURCE_SHA256: ""
    ports:
      - "8011:8011"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    restart: unless-stopped

volumes:
  pgdata:
